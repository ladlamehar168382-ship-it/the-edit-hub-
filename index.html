<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE EDIT HUB</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

body::-webkit-scrollbar{
width:8px;
}

body::-webkit-scrollbar-thumb{
background:#00e5ff;
border-radius:20px;
}

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:700;
color:#00e5ff;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:500;
transition:.3s;
}

nav ul li a:hover{
color:#00e5ff;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.8)),
url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1600');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:70px;
margin-bottom:15px;
text-shadow:0 0 25px #00e5ff;
}

.hero p{
font-size:22px;
color:#ddd;
max-width:700px;
margin:auto;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 40px;
background:#00e5ff;
color:black;
text-decoration:none;
font-weight:700;
border-radius:50px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 30px #00e5ff;
}

section{
padding:100px 8%;
}

.title{
text-align:center;
font-size:45px;
margin-bottom:50px;
color:#00e5ff;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#111;
padding:30px;
border-radius:20px;
transition:.4s;
border:1px solid #222;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(0,229,255,.4);
}

.card h3{
margin-bottom:15px;
color:#00e5ff;
}

.card p{
color:#bbb;
line-height:1.7;
}

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.portfolio img{
width:100%;
border-radius:20px;
height:250px;
object-fit:cover;
transition:.4s;
}

.portfolio img:hover{
transform:scale(1.05);
}
