<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Edit Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(120deg, #0f0f0f, #1c1c1c);
  color: white;
}

header {
  background: #000;
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #00ffcc;
  letter-spacing: 2px;
}

.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  color: #aaa;
  margin-top: 10px;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: #00ffcc;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.btn:hover {
  background: #00c9a5;
}

.section {
  padding: 50px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 250px;
  border: 1px solid #222;
}

footer {
  background: #000;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
  color: gray;
}
</style>

</head>

<body>

<header>
THE EDIT HUB
</header>

<div class="hero">
  <h1>We Create Viral Video Edits</h1>
  <p>Gaming | Cinematic | Shorts | Reels Editing</p>
  <button class="btn" onclick="window.location.href='https://wa.me/'">
    Order on WhatsApp
  </button>
</div>

<div class="section">
  <h2>Our Services</h2>
  <div class="cards">

    <div class="card">
      <h3>Gaming Edits</h3>
      <p>High energy montage videos</p>
    </div>

    <div class="card">
      <h3>Cinematic Edits</h3>
      <p>Movie style professional editing</p>
    </div>

    <div class="card">
      <h3>Reels / Shorts</h3>
      <p>Viral Instagram & TikTok edits</p>
    </div>

  </div>
</div>

<footer>
© 2026 The Edit Hub | All Rights Reserved
</footer>

</body>
</html>
